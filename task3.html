<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circle Area Calculator</title>
    <link rel="stylesheet" href="task3.css">
</head>
<body>

    <div class="card">
        <h3>Circle Calculator</h3>
        <p>Enter the radius (r) to find the area</p>
        
        <div class="input-container">
            <input type="number" id="radiusInput" placeholder="Radius..." min="0">
            <button onclick="calculateCircle()">Calculate</button>
        </div>

        <div id="output" class="result-box">
            The result will appear here & in the console.
        </div>
    </div>

    <script src="task3.js"></script>
</body>
</html>
